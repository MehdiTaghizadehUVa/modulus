# Configuration file for HydroGraphNet training and inference.

hydra:
  job:
    chdir: True
  run:
    dir: ./outputs_hydrographnet/

# Data configuration.
data_dir: ./data
test_dir: ./data/Test
stats_dir: ${data_dir}
prefix: M80
train_ids_file: train.txt
test_ids_file: test.txt
num_training_samples: 400
k_neighbors: 4

# Model / feature configuration.
n_time_steps: 2
num_input_features: null
num_output_features: 2
num_edge_features: 3

# Training configuration.
batch_size: 1
epochs: 100
lr: 0.0001
lr_decay_rate: 0.9999979
weight_decay: 0.0001

# Loss / rollout configuration.
noise_type: "none"
noise_std: 0.01
use_physics_loss: true
delta_t: 1200.0
physics_penalty_weight: 1.0
depth_volume_penalty_weight: 1.0
pushforward_stability_weight: 1.0

# Performance and optimization.
use_apex: True
amp: False
jit: False
num_dataloader_workers: 4
do_concat_trick: False
num_processor_checkpoint_segments: 0
recompute_activation: False

# Optional model controls.
mlp_activation_fn: relu
processor_size: 15
hidden_dim_processor: 128
hidden_dim_node_encoder: 128
hidden_dim_edge_encoder: 128
hidden_dim_node_decoder: 128
num_layers_node_processor: 2
num_layers_edge_processor: 2
num_layers_node_encoder: 2
num_layers_node_decoder: 2
aggregation: sum
checkpoint_offloading: False
num_harmonics: 5

# Logging.
wandb_mode: disabled
watch_model: False

# Checkpoints / outputs.
ckpt_path: ./checkpoints_hydrographnet
animation_output_dir: ./animations

# Evaluation configuration.
num_test_time_steps: 30
